<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <!-- Top Blue Bar -->
        <div class="top-accent"></div>

        <!-- Header Section -->
        <header class="sidebar-header">
            <button class="close-btn">&times;</button>
            <div class="user-profile">
                <div class="avatar">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="auth-links">
                    <a href="#">Sign in</a> | <a href="#">Register</a>
                </div>
            </div>
        </header>

        <!-- Navigation Menu -->
        <nav class="sidebar-menu">
            <ul class="menu-group">
                <li><a href="#"><span class="icon">🏠</span> Home</a></li>
                <li><a href="#"><span class="icon">▤</span> Categories</a></li>
                <li><a href="#"><span class="icon">♡</span> Favorites</a></li>
                <li><a href="#"><span class="icon">📦</span> My orders</a></li>
            </ul>

            <div class="divider"></div>

            <ul class="menu-group">
                <li><a href="#"><span class="icon">🌐</span> English | USD</a></li>
                <li><a href="#"><span class="icon">🎧</span> Contact us</a></li>
                <li><a href="#"><span class="icon">🏢</span> About</a></li>
            </ul>

            <div class="divider"></div>

            <ul class="menu-group legal-links">
                <li><a href="#">User agreement</a></li>
                <li><a href="#">Partnership</a></li>
                <li><a href="#">Privacy policy</a></li>
            </ul>
        </nav>

        <!-- Bottom Blue Bar -->
        <div class="bottom-accent"></div>
    </aside>
<script src="js/main.js"></script>
</body>
</html>
